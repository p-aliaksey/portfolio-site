version: '3.9'
services:
  app:
    build: ./app
    ports:
      - "8080:80"
    restart: always

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    volumes:
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki
    volumes:
      - ./logging/loki-config.yml:/etc/loki/local-config.yml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
